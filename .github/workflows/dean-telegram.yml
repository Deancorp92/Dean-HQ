name: Dean Telegram Gateway

on:
  workflow_dispatch:
    inputs:
      command:
        description: "What Dean should do"
        required: true
        type: string
      context:
        description: "Background context"
        required: false
        type: string
      priority:
        description: "priority"
        required: false
        type: choice
        options:
          - low
          - normal
          - high
        default: normal
      target:
        description: "target task"
        required: false
        type: string

permissions:
  contents: read

jobs:
  dean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare folders
        run: mkdir -p inputs outputs logs archive

      - name: Save request
        run: |
          cat > inputs/request.json << 'EOF'
          {
            "command": "${{ inputs.command }}",
            "context": "${{ inputs.context }}",
            "priority": "${{ inputs.priority }}",
            "target": "${{ inputs.target }}"
          }
          EOF

      - name: Run Dean
        run: |
          python - <<'PY'
          import json, os, datetime

          with open("inputs/request.json", "r", encoding="utf-8") as f:
              req = json.load(f)

          result = {
              "status": "success",
              "summary": f"Processed command: {req['command']}",
              "details": req,
              "saved_location": "archive/result.json",
              "next_action": "awaiting approval"
          }

          for d in ["outputs", "archive", "logs"]:
              os.makedirs(d, exist_ok=True)

          with open("outputs/result.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          with open("archive/result.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          with open("logs/run.log", "a", encoding="utf-8") as f:
              f.write(f"{datetime.datetime.utcnow().isoformat()}Z {json.dumps(result, ensure_ascii=False)}\n")
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dean-output
          path: |
            outputs/
            archive/
            logs/
          if-no-files-found: error

      - name: Send Telegram reply
        run: |
          python - <<'PY'
          import json

          with open("outputs/result.json", "r", encoding="utf-8") as f:
              result = json.load(f)

          text = (
              f"status: {result.get('status')}\n"
              f"summary: {result.get('summary')}\n"
              f"saved_location: {result.get('saved_location')}\n"
              f"next_action: {result.get('next_action')}"
          )

          with open("telegram_message.txt", "w", encoding="utf-8") as f:
              f.write(text)
          PY

          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$(cat telegram_message.txt)"
