name: Dean Telegram Gateway

on:
  workflow_dispatch:
    inputs:
      type:
        description: "message type"
        required: true
        type: choice
        options:
          - approval
          - change
          - execution
      command:
        description: "what Dean should do"
        required: true
        type: string
      context:
        description: "background context"
        required: false
        type: string
      priority:
        description: "priority"
        required: false
        type: choice
        options:
          - low
          - normal
          - high
        default: normal
      target:
        description: "target folder or task"
        required: false
        type: string

permissions:
  contents: read

jobs:
  dean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare folders
        run: |
          mkdir -p inputs outputs
          mkdir -p archive/legacy archive/reports archive/retired archive/templates
          mkdir -p logs/approval logs/change logs/execution

      - name: Save request
        run: |
          cat > inputs/request.json << 'EOF'
          {
            "type": "${{ inputs.type }}",
            "command": "${{ inputs.command }}",
            "context": "${{ inputs.context }}",
            "priority": "${{ inputs.priority }}",
            "target": "${{ inputs.target }}"
          }
          EOF

      - name: Run Dean
        run: |
          python - <<'PY'
          import json, os, datetime

          with open("inputs/request.json", "r", encoding="utf-8") as f:
              req = json.load(f)

          msg_type = req["type"]
          if msg_type not in ["approval", "change", "execution"]:
              msg_type = "execution"

          if msg_type == "approval":
              archive_dir = "archive/legacy"
          elif msg_type == "change":
              archive_dir = "archive/reports"
          else:
              archive_dir = "archive/reports"

          result = {
              "type": msg_type,
              "status": "success",
              "summary": f"Processed {req['command']}",
              "details": req,
              "saved_location": f"{archive_dir}/result.json",
              "next_action": "awaiting approval"
          }

          os.makedirs("outputs", exist_ok=True)
          os.makedirs(archive_dir, exist_ok=True)
          os.makedirs(f"logs/{msg_type}", exist_ok=True)

          with open("outputs/result.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          with open(f"logs/{msg_type}/run.log", "a", encoding="utf-8") as f:
              f.write(f"{datetime.datetime.utcnow().isoformat()}Z {json.dumps(result, ensure_ascii=False)}\n")

          with open(f"{archive_dir}/result.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False, indent=2)
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dean-output
          path: |
            outputs/
            archive/
            logs/
          if-no-files-found: error

      - name: Build Telegram message
        run: |
          python - <<'PY'
          import json

          with open("outputs/result.json", "r", encoding="utf-8") as f:
              result = json.load(f)

          text = (
              f"type: {result.get('type')}\n"
              f"status: {result.get('status')}\n"
              f"summary: {result.get('summary')}\n"
              f"saved_location: {result.get('saved_location')}\n"
              f"next_action: {result.get('next_action')}"
          )

          with open("telegram_message.txt", "w", encoding="utf-8") as f:
              f.write(text)
          PY

      - name: Send Telegram reply
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            --data-urlencode "text=$(cat telegram_message.txt)"
