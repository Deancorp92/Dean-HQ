name: Dean Triage

on:
  workflow_dispatch:
    inputs:
      request_type:
        description: "Type of request"
        required: true
        type: choice
        options:
          - general
          - management
          - business
          - product
          - archive
        default: general

      priority:
        description: "Priority level"
        required: true
        type: choice
        options:
          - low
          - normal
          - high
          - urgent
        default: normal

      needs_approval:
        description: "Approval required?"
        required: true
        type: boolean
        default: true

      archive_mode:
        description: "Archive this run?"
        required: true
        type: boolean
        default: true

      notes:
        description: "Short context for Dean"
        required: false
        type: string
        default: ""

jobs:
  triage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show inputs
        run: |
          echo "request_type=${{ inputs.request_type }}"
          echo "priority=${{ inputs.priority }}"
          echo "needs_approval=${{ inputs.needs_approval }}"
          echo "archive_mode=${{ inputs.archive_mode }}"
          echo "notes=${{ inputs.notes }}"

      - name: Load Dean rules
        run: |
          cat agents/dean.md
          cat policies/approval-rules.md
          cat docs/report-templates.md

      - name: Triage result
        run: |
          echo "Dean triage completed."
